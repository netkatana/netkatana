[headers_hsts_missing]
severity = "critical"
detail = "The 'Strict-Transport-Security' header instructs browsers to always use HTTPS for this domain, preventing protocol downgrade and SSL stripping attacks."

[headers_hsts_invalid]
severity = "critical"
detail = "The 'Strict-Transport-Security' header requires a valid 'max-age' directive; a malformed header is silently ignored by browsers."

[headers_hsts_max_age_zero]
severity = "critical"
detail = "'max-age=0' instructs browsers to delete the cached HSTS policy, removing HTTPS enforcement for returning users."

[headers_hsts_max_age_low]
severity = "warning"
detail = "The 'max-age' directive controls how long browsers enforce HTTPS for this domain; values below one year (31,536,000 s) leave a wider window for downgrade attacks between visits."

[headers_hsts_include_subdomains_missing]
severity = "notice"
detail = "The 'includeSubDomains' directive extends HSTS to all subdomains; without it, subdomains are reachable over plain HTTP and parent-domain cookies may be intercepted."

[headers_hsts_preload_not_eligible]
severity = "warning"
detail = "The 'preload' directive signals intent to join browser preload lists, which hardcode the HSTS policy before a user's first visit; qualifying requires 'max-age' ≥ 31,536,000 s and 'includeSubDomains'."

[headers_csp_missing]
severity = "warning"
detail = "The 'Content-Security-Policy' header restricts which resources browsers can load, reducing the risk of XSS and data injection attacks."

[headers_csp_unsafe_inline]
severity = "critical"
detail = "'unsafe-inline' in 'script-src' (or 'default-src') permits all inline scripts; a nonce or hash neutralizes it and restores XSS protection in CSP Level 2+ browsers."

[headers_csp_report_only_unsafe_inline]
severity = "critical"
detail = "'unsafe-inline' in 'script-src' (or 'default-src') permits all inline scripts; a nonce or hash neutralizes it and restores XSS protection in CSP Level 2+ browsers."

[headers_csp_unsafe_eval]
severity = "critical"
detail = "'unsafe-eval' in 'script-src' (or 'default-src') permits eval(), new Function(string), and similar dynamic code execution from strings."

[headers_csp_report_only_unsafe_eval]
severity = "critical"
detail = "'unsafe-eval' in 'script-src' (or 'default-src') permits eval(), new Function(string), and similar dynamic code execution from strings."

[headers_csp_object_src_unsafe]
severity = "warning"
detail = "'object-src' (or 'default-src') controls <object> and <embed> elements; plugin content runs outside the browser's normal security model and has historically enabled code execution."

[headers_csp_report_only_object_src_unsafe]
severity = "warning"
detail = "'object-src' (or 'default-src') controls <object> and <embed> elements; plugin content runs outside the browser's normal security model and has historically enabled code execution."

[headers_csp_base_uri_missing]
severity = "warning"
detail = "'base-uri' restricts the <base> element's 'href', preventing attackers from redirecting relative resource loads and bypassing 'script-src'; it does not fall back to 'default-src'."

[headers_csp_report_only_base_uri_missing]
severity = "warning"
detail = "'base-uri' restricts the <base> element's 'href', preventing attackers from redirecting relative resource loads and bypassing 'script-src'; it does not fall back to 'default-src'."

[headers_csp_frame_ancestors_missing]
severity = "warning"
detail = "'frame-ancestors' controls which origins can embed this page in a frame or iframe, preventing clickjacking; it does not fall back to 'default-src'."

[headers_csp_report_only_frame_ancestors_missing]
severity = "warning"
detail = "'frame-ancestors' controls which origins can embed this page in a frame or iframe, preventing clickjacking; it does not fall back to 'default-src'."

[headers_csp_form_action_missing]
severity = "warning"
detail = "'form-action' restricts which URLs forms may submit to, preventing data exfiltration via injected forms; it does not fall back to 'default-src'."

[headers_csp_report_only_form_action_missing]
severity = "warning"
detail = "'form-action' restricts which URLs forms may submit to, preventing data exfiltration via injected forms; it does not fall back to 'default-src'."

[headers_csp_script_src_missing]
severity = "critical"
detail = "'script-src' (falling back to 'default-src') restricts which scripts browsers execute; without either directive, scripts are completely unrestricted."

[headers_csp_report_only_script_src_missing]
severity = "critical"
detail = "'script-src' (falling back to 'default-src') restricts which scripts browsers execute; without either directive, scripts are completely unrestricted."

[headers_csp_script_src_unrestricted]
severity = "critical"
detail = "A wildcard source (*, 'https:', or 'http:') in 'script-src' (or 'default-src') allows scripts from any origin, making the allowlist pointless."

[headers_csp_report_only_script_src_unrestricted]
severity = "critical"
detail = "A wildcard source (*, 'https:', or 'http:') in 'script-src' (or 'default-src') allows scripts from any origin, making the allowlist pointless."

[headers_csp_style_src_missing]
severity = "critical"
detail = "'style-src' (falling back to 'default-src') restricts which stylesheets browsers load; without either directive, CSS injection and data exfiltration via url() probes are possible."

[headers_csp_report_only_style_src_missing]
severity = "critical"
detail = "'style-src' (falling back to 'default-src') restricts which stylesheets browsers load; without either directive, CSS injection and data exfiltration via url() probes are possible."

[headers_csp_style_src_unrestricted]
severity = "critical"
detail = "A wildcard source (*, 'https:', or 'http:') in 'style-src' (or 'default-src') allows stylesheets from any origin, making the allowlist pointless."

[headers_csp_report_only_style_src_unrestricted]
severity = "critical"
detail = "A wildcard source (*, 'https:', or 'http:') in 'style-src' (or 'default-src') allows stylesheets from any origin, making the allowlist pointless."

[headers_csp_connect_src_missing]
severity = "critical"
detail = "'connect-src' (falling back to 'default-src') restricts fetch, XHR, and WebSocket destinations; without either directive, connections to arbitrary origins are unrestricted."

[headers_csp_report_only_connect_src_missing]
severity = "critical"
detail = "'connect-src' (falling back to 'default-src') restricts fetch, XHR, and WebSocket destinations; without either directive, connections to arbitrary origins are unrestricted."

[headers_csp_connect_src_unrestricted]
severity = "critical"
detail = "A wildcard source (*, 'https:', or 'http:') in 'connect-src' (or 'default-src') allows fetch, XHR, and WebSocket connections to any origin, making the allowlist pointless."

[headers_csp_report_only_connect_src_unrestricted]
severity = "critical"
detail = "A wildcard source (*, 'https:', or 'http:') in 'connect-src' (or 'default-src') allows fetch, XHR, and WebSocket connections to any origin, making the allowlist pointless."

[headers_cors_allow_origin_wildcard]
severity = "warning"
detail = "The 'Access-Control-Allow-Origin' header controls which origins can read the response via JavaScript; a wildcard value ('*') grants read access to any origin on the internet."

[headers_cors_allow_origin_null]
severity = "critical"
detail = "An 'Access-Control-Allow-Origin' value of 'null' grants read access to sandboxed iframes, 'data:' URLs, and local files, all of which an attacker controls; the null origin is not a safe substitute for a specific origin."

[headers_cors_allow_credentials_wildcard]
severity = "critical"
detail = "Combining 'Access-Control-Allow-Origin: *' with 'Access-Control-Allow-Credentials: true' is rejected by browsers, but its presence indicates a likely misconfiguration where the server may be dynamically reflecting the 'Origin' header, granting any origin credentialed access."

[headers_cors_allow_credentials_invalid]
severity = "warning"
detail = "The 'Access-Control-Allow-Credentials' header only takes effect when its value is exactly 'true' (ASCII case-insensitive); any other value is treated as absent by browsers."

[headers_cors_allow_methods_unsafe]
severity = "notice"
detail = "The 'Access-Control-Allow-Methods' header lists the HTTP methods permitted for cross-origin requests; including mutating methods such as 'DELETE', 'PUT', or 'PATCH' broadens the attack surface for cross-origin state modification."

[headers_cors_max_age_excessive]
severity = "notice"
detail = "The 'Access-Control-Max-Age' header controls how long preflight results can be cached; values above 86,400 seconds exceed the Firefox cap, and values above 7,200 seconds exceed the Chromium (v76+) cap."

[tls_version_deprecated]
severity = "critical"
detail = "SSL 3.0, TLS 1.0, and TLS 1.1 contain known vulnerabilities (BEAST, POODLE) and are rejected by modern clients."

[tls_version_outdated]
severity = "notice"
detail = "TLS 1.3 offers improved security and performance over TLS 1.2."

[tls_cert_expired]
severity = "critical"
detail = "TLS certificates have an expiry date; after that date, clients will reject the connection or display a security warning."

[tls_cert_self_signed]
severity = "critical"
detail = "TLS certificates must be issued by a CA trusted by the client; self-signed certificates are rejected or warned about by browsers."

[tls_cert_mismatched]
severity = "critical"
detail = "A TLS certificate must cover the hostname being accessed; a mismatch causes clients to reject the connection."

[tls_cert_revoked]
severity = "critical"
detail = "CAs can revoke certificates before they expire; clients that check revocation status will reject a revoked certificate."

[tls_cert_untrusted]
severity = "critical"
detail = "The TLS certificate chain must be traceable to a root CA trusted by the client; an unverifiable chain causes connection rejection."

[tls_cipher_weak]
severity = "warning"
detail = "Cipher suites such as RC4, NULL, EXPORT, DES, 3DES, IDEA, and SEED have known weaknesses and should not be negotiated."

[dns_spf_missing]
severity = "notice"
detail = "An SPF TXT record lists the servers authorized to send email for this domain; without it, mail servers cannot verify sender authenticity."

[dns_spf_permissive]
severity = "critical"
detail = "The '+all' mechanism in an SPF record authorizes any server on the internet to send email for this domain, negating anti-spoofing protection."

[dns_spf_multiple]
severity = "warning"
detail = "Publishing more than one SPF policy record is a misconfiguration; receivers treat SPF evaluation as invalid when multiple 'v=spf1' records are present."

[dns_dmarc_missing]
severity = "notice"
detail = "A DMARC record at '_dmarc.<domain>' specifies how mail receivers should handle messages that fail SPF or DKIM checks."

[dns_dmarc_multiple]
severity = "warning"
detail = "Publishing more than one DMARC policy record is a misconfiguration; receivers cannot reliably determine which 'v=DMARC1' policy to apply."
